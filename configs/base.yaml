# ============================================================
# Echo-Mind System — Base Configuration
# ============================================================

# --- Paths ---
paths:
  iemocap_root: "/data/Brian/Dataset/IEMOCAP_full_release"
  output_dir: "./outputs"
  cache_dir: "./cache"

# --- Dataset ---
dataset:
  num_classes: 4
  max_audio_sec: 11.0
  audio_sample_rate: 16000
  max_text_tokens: 48
  label_map:
    ang: 0
    hap: 1
    exc: 1
    sad: 2
    neu: 3

# --- Audio Encoder ---
audio_encoder:
  name: "wav2vec2"
  model_id: "facebook/wav2vec2-base-960h"
  freeze: true
  output_dim: 768

# --- Text Encoder ---
text_encoder:
  name: "bert"
  model_id: "bert-base-uncased"
  freeze: true
  output_dim: 768
  pooling: "cls"

# --- Model ---
model:
  name: "late_fusion"       # "late_fusion" | "cross_attention" | "mamba_fusion"
  hidden_dim: 256
  dropout: 0.3
  num_heads: 8
  num_layers: 6

# --- Mamba v1 config ---
mamba:
  d_model: 256
  d_state: 16
  d_conv: 4
  expand: 2
  bidirectional: true       # forward + backward scan

# --- Mamba v2 config (Mamba2 / SSD) ---
# Constraint: (hidden_dim * expand) must be divisible by headdim
# Default: (256 * 2) / 64 = 8 heads
mamba_v2:
  d_state: 128              # larger state than v1 (16 → 128), richer SSM dynamics
  d_conv: 4
  expand: 2
  headdim: 64               # new v2 param: per-head dim → nheads = (256*2)/64 = 8
  bidirectional: true

# --- V-A Head (future) ---
va_head:
  grid_size: 9
  v_range: [1.0, 5.0]
  a_range: [1.0, 5.0]
  sigma: 0.5
  loss_weight: 0.3

# --- Training ---
training:
  epochs: 30
  batch_size: 32
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_ratio: 0.1
  gradient_clip: 1.0
  early_stopping_patience: 7
  class_weights: [1.0, 0.67, 1.0, 1.02]

# --- Evaluation ---
evaluation:
  loso_folds: 5
  metrics: ["wa", "ua", "f1_macro", "f1_weighted"]
  save_confusion_matrix: true
  save_best_model: true

# --- Hardware ---
hardware:
  device: "cuda"
  num_workers: 4
  pin_memory: true
  mixed_precision: true
  seed: 42